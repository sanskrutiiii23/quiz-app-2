<html class="bg-black" lang="en">
  <head>
    <meta charset="UTF-8" />

  <body class="bg-gradient-to-br from-black via-gray-900 to-black min-h-screen font-sans">
    <div id="home">
    <div class="flex justify-between items-center px-8 py-4 border-b border-gray-700">
      <h1 class="text-white text-2xl font-bold tracking-wide">QUIZ APP</h1>
      <div class="flex gap-8 text-sm font-medium">
        <a class="text-gray-300 hover:text-white cursor-pointer transition duration-200">HOME</a>
        <a class="text-gray-300 hover:text-white cursor-pointer transition duration-200">CONTACT</a>
        <a class="text-gray-300 hover:text-white cursor-pointer transition duration-200">ABOUT</a>
        <a class="text-gray-300 hover:text-white cursor-pointer transition duration-200">MORE</a>
      </div>
    </div>

    <div class="mt-40 flex flex-col justify-center items-center text-center gap-6">
      <p class="text-gray-400 text-lg">Welcome to the Quiz App</p>
      <button id="startBtn" class="cursor-pointer text-white px-8 py-3 bg-red-600 hover:bg-red-700 rounded-xl shadow-lg transition duration-300">
        Get Started
      </button>
    </div>
    </div>

    <div id="quizScreen" class="hidden text-white text-center mt-20 max-w-xl mx-auto bg-gray-900 p-6 rounded-2xl shadow-xl">
      <div class="flex justify-between text-white">
        <p  class=" text-white" id="questioncounter"></p>
        <p class=" text-white" id="score"></p>
      </div>
      <h3 class="text-xl font-semibold mb-6" id="question"></h3>
      <div class="flex flex-col gap-4" id="options"></div>
      <div class="mt-4 text-sm text-gray-400" id="feedback"></div>
      <button id="next" class="cursor-pointer mt-6 px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition duration-200">

      </div>
